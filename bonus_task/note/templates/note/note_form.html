{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заметка</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h1>{% if form.instance.pk %}Редактировать{% else %}Создать{% endif %} заметку</h1>
    <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-success">Сохранить</button>
        <a href="{% url 'note_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</body>
</html>
