{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2 class="mt-4">{% if form.instance.pk %}Edit{% else %}Add{% endif %} Reservation</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'reservation_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
