{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="my-4">{% if form.instance.pk %}Edit Table{% else %}Add Table{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'table_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
