{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="my-4">Tables</h2>
    <a href="{% url 'table_create' %}" class="btn btn-success mb-3">Add Table</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Number</th>
                <th>Seats</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for table in tables %}
            <tr>
                <td>{{ table.number }}</td>
                <td>{{ table.seats }}</td>
                <td>{{ table.available|yesno:"Yes,No" }}</td>
                <td>
                    <a href="{% url 'table_edit' table.pk %}" class="btn btn-primary btn-sm">Edit</a>
                    <a href="{% url 'table_delete' table.pk %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">No tables available</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
