{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2 class="my-4">Delete Table</h2>
    <p>Are you sure you want to delete Table {{ table.number }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'table_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
